spring.application.name=surehealth-test

spring.datasource.url=jdbc:postgresql://localhost:5432/careopinion
spring.datasource.username=test
spring.datasource.password=test

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# ================= FILE UPLOAD =================
file.upload-dir=uploads-test/

# ================= JWT =================
jwt.secret=test-secret-key-for-testing-development
jwt.expiration.access=3600000
jwt.refresh-expiration=86400000
jwt.issuer=test-issuer
jwt.audience=test-audience

# ================= SECURITY =================
security.login.rate-limit.max-attempts=1000
security.login.rate-limit.window-seconds=1

# ================= KAFKA (DISABLE / MOCK) =================
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.auto-offset-reset=earliest

kafka.enabled=false

# ================= REDIS =================
spring.redis.host=localhost
spring.redis.port=6379

# ================= LIQUIBASE =================
spring.liquibase.enabled=false

# ================= TRACING =================
management.tracing.enabled=false

# ================= OUTBOX =================
outbox.publisher.delay-ms=1000