spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

jwt.issuer=${JWT_ISSUER}
jwt.audience=${JWT_AUDIENCE}
jwt.clock-skew-seconds=${JWT_CLOCK_SKEW_SECONDS:60}

security.login.rate-limit.max-attempts=${LOGIN_RATE_LIMIT_MAX:5}
security.login.rate-limit.window-seconds=${LOGIN_RATE_LIMIT_WINDOW_SECONDS:300}

kafka.consumer.idempotency.ttl-seconds=${KAFKA_IDEMPOTENCY_TTL_SECONDS:86400}

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=never

outbox.publisher.delay-ms=${OUTBOX_PUBLISHER_DELAY_MS:5000}

management.metrics.tags.application=${spring.application.name}
management.tracing.enabled=true
management.tracing.sampling.probability=${OTEL_TRACES_SAMPLING_PROBABILITY:0.2}
management.otlp.tracing.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT}
