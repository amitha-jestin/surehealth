spring.application.name=surehealth
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=${FILE_UPLOAD_DIR}

jwt.secret=${JWT_SECRET}
jwt.expiration.access=${JWT_EXPIRATION:3600000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:86400000}
jwt.issuer=${JWT_ISSUER:surehealth-api}
jwt.audience=${JWT_AUDIENCE:surehealth-client}
jwt.clock-skew-seconds=${JWT_CLOCK_SKEW_SECONDS:60}

security.login.rate-limit.max-attempts=${LOGIN_RATE_LIMIT_MAX:10}
security.login.rate-limit.window-seconds=${LOGIN_RATE_LIMIT_WINDOW_SECONDS:300}

# Kafka bootstrap servers
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}

# Kafka consumer configuration
spring.kafka.consumer.group-id=surehealth-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.sociolab.surehealth.*

# Kafka producer configuration
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

kafka.consumer.idempotency.ttl-seconds=${KAFKA_IDEMPOTENCY_TTL_SECONDS:86400}

spring.redis.host=${REDIS_HOST}
spring.redis.port=${REDIS_PORT}

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when_authorized

spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

outbox.publisher.delay-ms=${OUTBOX_PUBLISHER_DELAY_MS:5000}

management.metrics.tags.application=${spring.application.name}
management.tracing.enabled=true
management.tracing.sampling.probability=${OTEL_TRACES_SAMPLING_PROBABILITY:1.0}
management.otlp.tracing.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
